name: (M) Release Create

on:
  workflow_dispatch:
    inputs:
      type:
        description: Bump type
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - set
      version:
        description: Explicit version when type="set" (e.g., v1.2.3)
        required: false
        default: ''
      build_only:
        description: Build and push artifacts without version bump
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  call:
    uses: devops-infra/.github/.github/workflows/reusable-manual-release-create.yml@v1
    with:
      bump-type: ${{ inputs.type }}
      explicit-version: ${{ inputs.version }}
      build-and-push-only: ${{ inputs.build_only }}
      profile: actions
    secrets: inherit

  smoke-test:
    name: Smoke test local action image
    needs: [call]
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Build and run smoke test
        run: task docker:test:smoke
